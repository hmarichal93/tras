# TRAS Batch Processing Configuration Example
# Use this file with: tras_detect /path/to/images --config process_config.yml
#
# Only `physical_scale` is required. Every detection parameter you omit falls back
# to the TRAS defaults in tras/config/detection_defaults.yaml — so list a value here
# only when you want to override the default. The blocks below show the common knobs.

# REQUIRED: Physical scale for measurement outputs
physical_scale:
  value: 0.0213  # unit per pixel (e.g., 0.0213 mm/px)
  unit: mm       # unit name (mm, cm, etc.)

# Preprocessing options (optional)
preprocess:
  resize_scale: 0.7            # resize image (0.1-1.0); omit to disable
  remove_background: false     # remove background with U2Net

# Pith detection (optional; defaults: auto=true, method=apd_dl)
pith:
  auto: true
  method: apd_dl               # 'apd', 'apd_pcl', or 'apd_dl'

# Tree ring detection (optional; default method is deepcstrd)
rings:
  method: deepcstrd            # 'cstrd', 'deepcstrd', or 'inbd'

  # Per-method overrides — include only the keys you want to change.
  # See tras/config/detection_defaults.yaml for every parameter and its default.
  deepcstrd:
    model: generic             # model ID, or a path to a .pth weights file
    # tile_size: 0             # 0 = full image, 256 = tiled
    # width: 1504              # resize before detection (0 = no resize)

  # cstrd:
  #   sigma: 3.0

  # inbd:
  #   model: INBD_EH           # model ID, or a path to a .pt.zip checkpoint
